<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline - ICodeDev</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #312e81 0%, #1f2937 100%); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .container { max-width: 480px; }
        .icon { font-size: 4rem; margin-bottom: 1.5rem; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: #d1d5db; font-size: 1.1rem; margin-bottom: 2rem; line-height: 1.6; }
        .btn { display: inline-block; padding: 0.875rem 2rem; background: #6366f1; color: #fff; text-decoration: none; border-radius: 0.75rem; font-weight: 600; border: none; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
